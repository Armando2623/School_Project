spring.application.name=asistencia-service

# Conexion a la Base de Datos
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/schoolguard}
spring.datasource.username=${DATABASE_USER:root}
spring.datasource.password=${DATABASE_PASSWORD:75126939}
spring.datasource.driver-class-name=${DATABASE_DRIVER:com.mysql.cj.jdbc.Driver}

# Pool de conexiones y manejar reconexiones con BD cloud
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-test-query=SELECT 1

# JPA / Hibernate
spring.jpa.database-platform=${DB_DIALECT:org.hibernate.dialect.MySQLDialect}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Flyway (deshabilitado - usando ddl-auto)
spring.flyway.enabled=false

# Puerto del microservicio
server.port=${PORT:8081}

# URL del backend MVC principal
# En local apunta a localhost; en Render debe apuntar a la URL del MVC ya desplegado.

mvc.base-url=${MVC_BASE_URL:}
# Clave secreta JWT externalizada

jwt.secret=${JWT_SECRET:}

spring.main.allow-bean-definition-overriding=true
springdoc.swagger-ui.path=/swagger-ui.html

# Configuracion de Email (Resend HTTP API  compatible con Render)

resend.api-key=${RESEND_API_KEY:}

# Remitente de notificaciones

notificacion.email.from=${MAIL_USERNAME:}
notificacion.email.nombre-remitente=SchoolGuard Sistema de Asistencia
