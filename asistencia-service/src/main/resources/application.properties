spring.application.name=asistencia-service

# Conexiˇn a la Base de Datos (Variables dinßmicas con fallback local)
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/schoolguard}
spring.datasource.username=${DATABASE_USER:root}
spring.datasource.password=${DATABASE_PASSWORD:75126939}
spring.datasource.driver-class-name=${DATABASE_DRIVER:com.mysql.cj.jdbc.Driver}

# JPA / Hibernate
spring.jpa.database-platform=${DB_DIALECT:org.hibernate.dialect.MySQLDialect}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

## Flyway (deshabilitado - usando ddl-auto)
spring.flyway.enabled=false

# Puerto del microservicio (OBLIGATORIO para Render: debe leer la variable PORT)
server.port=${PORT:8081}

# URL del backend MVC principal (Externalizado para producciˇn)
# En local apuntarß a localhost, pero en Render deberß apuntar a la URL de tu MVC principal ya desplegado.
mvc.base-url=${MVC_BASE_URL:http://localhost:8080}

# Clave secreta JWT externalizada
jwt.secret=${JWT_SECRET:SchoolGuardSecretKeyMuySeguraParaJWT2024XYZ!}

spring.main.allow-bean-definition-overriding=true
springdoc.swagger-ui.path=/swagger-ui.html

# Configuraciˇn de Servidor de Correo (SMTP) - Datos sensibles protegidos
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:armando.ortizvegas@gmail.com}
spring.mail.password=${MAIL_PASSWORD:ubpcdypinhihjmxb}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Remitente de notificaciones
notificacion.email.from=${MAIL_USERNAME:armando.ortizvegas@gmail.com}
